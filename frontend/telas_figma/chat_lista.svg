<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screen"><rect width="375" height="812" fill="white"/></clipPath>
    <filter id="shadow" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="-1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <filter id="cs" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>
  <g clip-path="url(#screen)">
    <rect width="375" height="812" fill="#F2EFE4"/>
    <text x="32" y="28" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="black">9:41</text>
    <rect x="338" y="18" width="22" height="11" rx="3" stroke="black" stroke-opacity="0.35" fill="none"/>
    <rect x="340" y="20" width="18" height="7" rx="1.5" fill="black"/>

    <!-- HEADER -->
    <text x="20" y="74" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#455A64">Mensagens</text>
    <!-- Search icon -->
    <g transform="translate(320, 56)">
      <circle cx="12" cy="12" r="9" stroke="#455A64" stroke-width="2" fill="none"/>
      <line x1="19" y1="19" x2="24" y2="24" stroke="#455A64" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- CHAT ITEM 1 (unread) -->
    <g filter="url(#cs)"><rect x="16" y="100" width="343" height="76" rx="14" fill="white"/></g>
    <!-- Avatar -->
    <circle cx="56" cy="138" r="24" fill="#EE791C" opacity="0.12"/>
    <text x="47" y="144" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#EE791C">MS</text>
    <!-- Content -->
    <text x="90" y="126" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">Maria Santos</text>
    <text x="90" y="148" font-family="Inter, sans-serif" font-size="13" fill="#828282">Vi um cachorro parecido com o Rex...</text>
    <!-- Time + unread -->
    <text x="300" y="126" font-family="Inter, sans-serif" font-size="11" fill="#828282">10:32</text>
    <circle cx="330" cy="148" r="10" fill="#EE791C"/>
    <text x="326" y="152" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white">2</text>

    <!-- CHAT ITEM 2 (unread) -->
    <g filter="url(#cs)"><rect x="16" y="188" width="343" height="76" rx="14" fill="white"/></g>
    <circle cx="56" cy="226" r="24" fill="#455A64" opacity="0.1"/>
    <text x="47" y="232" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#455A64">PL</text>
    <text x="90" y="214" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">Pedro Lima</text>
    <text x="90" y="236" font-family="Inter, sans-serif" font-size="13" fill="#828282">Olá! O gato que você encontrou é...</text>
    <text x="300" y="214" font-family="Inter, sans-serif" font-size="11" fill="#828282">09:15</text>
    <circle cx="330" cy="236" r="10" fill="#EE791C"/>
    <text x="327" y="240" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white">1</text>

    <!-- CHAT ITEM 3 (read) -->
    <g filter="url(#cs)"><rect x="16" y="276" width="343" height="76" rx="14" fill="white"/></g>
    <circle cx="56" cy="314" r="24" fill="#EE791C" opacity="0.08"/>
    <text x="46" y="320" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#EE791C">AC</text>
    <text x="90" y="302" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#1A1A1A">Ana Costa</text>
    <text x="90" y="324" font-family="Inter, sans-serif" font-size="13" fill="#828282">Obrigada pela ajuda! Já encontrei.</text>
    <text x="296" y="302" font-family="Inter, sans-serif" font-size="11" fill="#828282">Ontem</text>

    <!-- CHAT ITEM 4 (read) -->
    <g filter="url(#cs)"><rect x="16" y="364" width="343" height="76" rx="14" fill="white"/></g>
    <circle cx="56" cy="402" r="24" fill="#455A64" opacity="0.08"/>
    <text x="46" y="408" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#455A64">CF</text>
    <text x="90" y="390" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#1A1A1A">Carlos Ferreira</text>
    <text x="90" y="412" font-family="Inter, sans-serif" font-size="13" fill="#828282">Pode enviar mais fotos?</text>
    <text x="296" y="390" font-family="Inter, sans-serif" font-size="11" fill="#828282">Seg</text>

    <!-- CHAT ITEM 5 (read) -->
    <g filter="url(#cs)"><rect x="16" y="452" width="343" height="76" rx="14" fill="white"/></g>
    <circle cx="56" cy="490" r="24" fill="#EE791C" opacity="0.08"/>
    <text x="47" y="496" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#EE791C">JR</text>
    <text x="90" y="478" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#1A1A1A">Julia Ribeiro</text>
    <text x="90" y="500" font-family="Inter, sans-serif" font-size="13" fill="#828282">Boa tarde! Sobre o Labrador...</text>
    <text x="296" y="478" font-family="Inter, sans-serif" font-size="11" fill="#828282">12/06</text>

    <!-- BOTTOM NAV -->
    <g filter="url(#shadow)"><rect y="714" width="375" height="98" fill="#F2EFE4"/></g>
    <line x1="0" y1="714" x2="375" y2="714" stroke="#E6E6E6" stroke-width="0.5"/>
    <g transform="translate(168, 718)">
      <circle cx="20" cy="16" r="24" fill="#EE791C"/>
      <line x1="20" y1="6" x2="20" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="30" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="29" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Buscar</text>
    <text x="103" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Pets</text>
    <text x="250" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Alertas</text>
    <text x="323" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Perfil</text>

    <rect x="121" y="799" width="134" height="5" rx="2.5" fill="black"/>
  </g>
</svg>
