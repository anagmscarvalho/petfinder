<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screen"><rect width="375" height="812" fill="white"/></clipPath>
    <filter id="shadow" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="-1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <filter id="cs" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>
  <g clip-path="url(#screen)">
    <rect width="375" height="812" fill="#F2EFE4"/>
    <text x="32" y="28" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="black">9:41</text>
    <rect x="338" y="18" width="22" height="11" rx="3" stroke="black" stroke-opacity="0.35" fill="none"/>
    <rect x="340" y="20" width="18" height="7" rx="1.5" fill="black"/>

    <!-- HEADER -->
    <text x="20" y="74" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#455A64">Notificações</text>
    <!-- Mark all read -->
    <text x="260" y="74" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#EE791C">Marcar lidas</text>

    <!-- TODAY SECTION -->
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#828282" letter-spacing="0.5">HOJE</text>

    <!-- NOTIFICATION 1 - Match (unread) -->
    <g filter="url(#cs)"><rect x="16" y="122" width="343" height="86" rx="14" fill="white"/></g>
    <rect x="14" y="122" width="4" height="86" rx="2" fill="#EE791C"/>
    <!-- Match icon -->
    <circle cx="48" cy="158" r="20" fill="#EE791C" opacity="0.1"/>
    <g transform="translate(38, 148)">
      <circle cx="10" cy="10" r="8" stroke="#EE791C" stroke-width="1.8" fill="none"/>
      <line x1="16" y1="16" x2="20" y2="20" stroke="#EE791C" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <text x="78" y="146" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1A1A1A">Match encontrado! 🎉</text>
    <text x="78" y="164" font-family="Inter, sans-serif" font-size="12" fill="#828282">Um pet com 87% de similaridade ao Rex</text>
    <text x="78" y="182" font-family="Inter, sans-serif" font-size="12" fill="#828282">foi identificado na região do Marco.</text>
    <text x="300" y="146" font-family="Inter, sans-serif" font-size="11" fill="#828282">10:30</text>

    <!-- NOTIFICATION 2 - Message (unread) -->
    <g filter="url(#cs)"><rect x="16" y="220" width="343" height="76" rx="14" fill="white"/></g>
    <rect x="14" y="220" width="4" height="76" rx="2" fill="#EE791C"/>
    <circle cx="48" cy="252" r="20" fill="#455A64" opacity="0.08"/>
    <g transform="translate(36, 242)">
      <path d="M0 2C0 .9.9 0 2 0h16c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H7l-5 4v-4H2c-1.1 0-2-.9-2-2V2z" stroke="#455A64" stroke-width="1.5" fill="none"/>
    </g>
    <text x="78" y="244" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1A1A1A">Nova mensagem</text>
    <text x="78" y="262" font-family="Inter, sans-serif" font-size="12" fill="#828282">Maria Santos enviou uma mensagem</text>
    <text x="78" y="280" font-family="Inter, sans-serif" font-size="12" fill="#828282">sobre o Rex.</text>
    <text x="304" y="244" font-family="Inter, sans-serif" font-size="11" fill="#828282">9:45</text>

    <!-- YESTERDAY SECTION -->
    <text x="20" y="322" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#828282" letter-spacing="0.5">ONTEM</text>

    <!-- NOTIFICATION 3 - Pet registered (read) -->
    <g filter="url(#cs)"><rect x="16" y="334" width="343" height="76" rx="14" fill="white"/></g>
    <circle cx="48" cy="366" r="20" fill="#4CAF50" opacity="0.08"/>
    <g transform="translate(38, 356)">
      <path d="M3 10l5 5 10-10" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="78" y="358" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">Pet cadastrado com sucesso</text>
    <text x="78" y="376" font-family="Inter, sans-serif" font-size="12" fill="#828282">O pet "Rex" foi registrado. A IA está</text>
    <text x="78" y="394" font-family="Inter, sans-serif" font-size="12" fill="#828282">processando os embeddings.</text>
    <text x="296" y="358" font-family="Inter, sans-serif" font-size="11" fill="#828282">Ontem</text>

    <!-- NOTIFICATION 4 - Contact (read) -->
    <g filter="url(#cs)"><rect x="16" y="422" width="343" height="76" rx="14" fill="white"/></g>
    <circle cx="48" cy="454" r="20" fill="#EE791C" opacity="0.08"/>
    <g transform="translate(36, 442)">
      <path d="M0 3c0-1.5 1-3 3-3h1l2 4-1.5 1c1 2 3 4 5 5l1-1.5 4 2v1c0 2-1.5 3-3 3C5 15 0 9.5 0 3z" stroke="#EE791C" stroke-width="1.5" fill="none"/>
    </g>
    <text x="78" y="446" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">Contato solicitado</text>
    <text x="78" y="464" font-family="Inter, sans-serif" font-size="12" fill="#828282">Ana Costa quer contatar você sobre</text>
    <text x="78" y="482" font-family="Inter, sans-serif" font-size="12" fill="#828282">o pet "Mimi".</text>
    <text x="296" y="446" font-family="Inter, sans-serif" font-size="11" fill="#828282">Ontem</text>

    <!-- OLDER SECTION -->
    <text x="20" y="524" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#828282" letter-spacing="0.5">ANTERIORES</text>

    <!-- NOTIFICATION 5 -->
    <g filter="url(#cs)"><rect x="16" y="536" width="343" height="66" rx="14" fill="white"/></g>
    <circle cx="48" cy="564" r="20" fill="#455A64" opacity="0.06"/>
    <g transform="translate(38, 554)">
      <path d="M10 1a7 7 0 0 1 7 7v4l2 2H1l2-2V8a7 7 0 0 1 7-7z" stroke="#455A64" stroke-width="1.5" fill="none"/>
      <path d="M8 16c0 1.2 1 2 2 2s2-.8 2-2" stroke="#455A64" stroke-width="1.5" fill="none"/>
    </g>
    <text x="78" y="558" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">IA processou com sucesso</text>
    <text x="78" y="576" font-family="Inter, sans-serif" font-size="12" fill="#828282">Embeddings do pet "Rex" gerados.</text>
    <text x="296" y="558" font-family="Inter, sans-serif" font-size="11" fill="#828282">10/06</text>

    <!-- NOTIFICATION 6 -->
    <g filter="url(#cs)"><rect x="16" y="614" width="343" height="66" rx="14" fill="white"/></g>
    <circle cx="48" cy="642" r="20" fill="#455A64" opacity="0.06"/>
    <g transform="translate(40, 634)">
      <path d="M8 14c-1-1-7-4-7-7.5 0-2 1.5-3.5 3.5-3.5 1 0 2 .5 3.5 2 1.5-1.5 2.5-2 3.5-2 2 0 3.5 1.5 3.5 3.5 0 3.5-6 6.5-7 7.5z" stroke="#455A64" stroke-width="1.5" fill="none"/>
    </g>
    <text x="78" y="636" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1A1A1A">Novo favorito</text>
    <text x="78" y="654" font-family="Inter, sans-serif" font-size="12" fill="#828282">Alguém favoritou o pet "Thor".</text>
    <text x="296" y="636" font-family="Inter, sans-serif" font-size="11" fill="#828282">08/06</text>

    <!-- BOTTOM NAV -->
    <g filter="url(#shadow)"><rect y="714" width="375" height="98" fill="#F2EFE4"/></g>
    <line x1="0" y1="714" x2="375" y2="714" stroke="#E6E6E6" stroke-width="0.5"/>
    <g transform="translate(168, 718)">
      <circle cx="20" cy="16" r="24" fill="#EE791C"/>
      <line x1="20" y1="6" x2="20" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="30" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="29" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Buscar</text>
    <text x="103" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Pets</text>
    <text x="246" y="764" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#EE791C">Alertas</text>
    <text x="323" y="764" font-family="Inter, sans-serif" font-size="10" fill="#455A64">Perfil</text>

    <rect x="121" y="799" width="134" height="5" rx="2.5" fill="black"/>
  </g>
</svg>
